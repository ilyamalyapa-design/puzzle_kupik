<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Пазл с шифром</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  overflow: hidden;
  overscroll-behavior: none;
  background: #1a1a2e;
  color: #dde3f0;
  font-family: 'Courier New', Courier, monospace;
  user-select: none;
  -webkit-user-select: none;
  -webkit-touch-callout: none;
}

body {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* ── HEADER ── */
header {
  flex: 0 0 auto;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 18px;
  background: #0f2240;
  border-bottom: 1px solid rgba(233, 69, 96, 0.35);
  position: relative;
  z-index: 8000;
}

header p {
  font-size: 13px;
  line-height: 1.5;
  text-align: center;
  color: #8fa5c0;
  letter-spacing: 0.015em;
}

header strong {
  color: #e94560;
  font-weight: 700;
  letter-spacing: 0.04em;
}

/* ── BOARD (видимая область — viewport) ── */
#board {
  flex: 1 1 auto;
  position: relative;
  overflow: hidden;
  cursor: grab;
  touch-action: none;
}

#board.panning {
  cursor: grabbing;
}

/* ── WORLD (трансформируется при зуме/панорамировании) ── */
#world {
  position: absolute;
  left: 0;
  top: 0;
  transform-origin: 0 0;
  will-change: transform;
}

/* ── TARGET FRAME (область сборки пазла) ── */
#target {
  position: absolute;
  border: 1px dashed rgba(255, 255, 255, 0.25);
  background-image: url('secret2.png');
  background-repeat: no-repeat;
  background-size: 100% 100%;
  background-position: center center;
  pointer-events: none;
  z-index: 0;
}

#target::before {
  content: '';
  position: absolute;
  inset: 0;
  background: rgba(0, 0, 0, 0.55);
  z-index: 1;
}

/* ── PIECES ── */
.piece {
  position: absolute;
  background-repeat: no-repeat;
  cursor: grab;
  box-shadow:
    inset 0 0 0 1px rgba(255, 255, 255, 0.07),
    0 2px 8px rgba(0, 0, 0, 0.55);
  will-change: left, top;
  touch-action: none;
  -webkit-touch-callout: none;
  z-index: 2;
  transition: box-shadow 0.12s;
}

.piece:hover {
  box-shadow:
    inset 0 0 0 1px rgba(255, 255, 255, 0.12),
    0 5px 18px rgba(0, 0, 0, 0.75);
  z-index: 3 !important;
}

.piece.dragging {
  cursor: grabbing !important;
  box-shadow:
    inset 0 0 0 1px rgba(255, 255, 255, 0.15),
    0 10px 36px rgba(0, 0, 0, 0.9);
  transition: none;
}

.piece.locked {
  cursor: default !important;
  pointer-events: none;
}

/* ── SNAP ANIMATION ── */
@keyframes snapFlash {
  0%   { transform: scale(1);    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.07), 0 2px 8px rgba(0,0,0,0.55); }
  38%  { transform: scale(1.05); box-shadow: inset 0 0 0 2px rgba(255,255,255,0.3), 0 0 22px rgba(255,255,255,0.7), 0 0 10px rgba(233,69,96,0.55); }
  100% { transform: scale(1);    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.07), 0 2px 8px rgba(0,0,0,0.55); }
}

.piece.snap-flash {
  animation: snapFlash 300ms ease-out forwards;
}

/* ── ZOOM HUD ── */
#zoom-hud {
  position: absolute;
  bottom: 14px;
  right: 14px;
  display: flex;
  gap: 6px;
  z-index: 9000;
}

.zoom-btn {
  width: 36px;
  height: 36px;
  background: rgba(15, 34, 64, 0.85);
  border: 1px solid rgba(255, 255, 255, 0.15);
  color: #c5d5e8;
  font-family: inherit;
  font-size: 18px;
  font-weight: 700;
  border-radius: 6px;
  cursor: pointer;
  transition: background 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
}

.zoom-btn:hover {
  background: rgba(40, 65, 110, 0.95);
}

.zoom-btn:active {
  background: rgba(60, 85, 130, 1);
}
</style>
</head>
<body>

<header>
  <p>Собери пазл и разгадай шифр. Ответ пришли личным сообщением в&nbsp;tg или mattermost <strong>@ilya_malyapa</strong></p>
</header>

<div id="board">
  <div id="world">
    <div id="target"></div>
  </div>

  <div id="zoom-hud">
    <button class="zoom-btn" id="zoom-out" title="Отдалить">−</button>
    <button class="zoom-btn" id="zoom-reset" title="Сброс" style="font-size:13px">⟲</button>
    <button class="zoom-btn" id="zoom-in" title="Приблизить">+</button>
  </div>
</div>

<script>
'use strict';

/* ══════════════════════════════════════
   КОНФИГУРАЦИЯ
══════════════════════════════════════ */
const CONFIG = {
  imageUrl:    'secret.png',
  bgImageUrl:  'secret2.png',
  cols:        6,
  rows:        5,
  snapDist:    25,        // px (в координатах world) — дистанция прилипания
  snapMs:      200,
  // Размер «мира» — большой, чтобы было куда раскидать кусочки и куда панорамировать.
  // Картинка квадратная 1:1, и берётся как 70% от меньшей стороны видимой области.
  worldPad:    0.6,       // отступ вокруг рамки в долях от её стороны (0.6 → +60% с каждой стороны)
  // Зум
  minZoom:     0.4,
  maxZoom:     3.0,
  zoomStep:    1.15,      // множитель на одно колёсико/кнопку
};

/* ══════════════════════════════════════
   DOM-элементы
══════════════════════════════════════ */
const board    = document.getElementById('board');
const world    = document.getElementById('world');
const targetEl = document.getElementById('target');
const btnIn    = document.getElementById('zoom-in');
const btnOut   = document.getElementById('zoom-out');
const btnReset = document.getElementById('zoom-reset');

/* ══════════════════════════════════════
   ГЛОБАЛЬНОЕ СОСТОЯНИЕ
══════════════════════════════════════ */
let pieces  = [];
let pieceW  = 0;
let pieceH  = 0;
let tRect   = {};            // координаты рамки сборки в системе world
let worldW  = 0;
let worldH  = 0;

// Состояние зума и панорамирования (трансформация world)
let zoom = 1;
let panX = 0;   // смещение world внутри board (в screen-px)
let panY = 0;

let drag = null;             // активный drag кусочка
let pan  = null;             // активное панорамирование

// Pinch-zoom (два пальца)
let pinch = null;

let audioCtx = null;

/* ══════════════════════════════════════
   ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ
══════════════════════════════════════ */
function puzzleComplete() {
  return pieces.length > 0 && pieces.every(p => p.dataset.snapped === '1');
}

function applyTransform() {
  world.style.transform = `translate(${panX}px, ${panY}px) scale(${zoom})`;
}

// Перевод screen-координат (внутри board) → координаты world
function screenToWorld(sx, sy) {
  return {
    x: (sx - panX) / zoom,
    y: (sy - panY) / zoom,
  };
}

// Получить координаты события в системе board (без учёта зума)
function evtBoardPos(e) {
  const t = e.touches ? e.touches[0] : e;
  const br = board.getBoundingClientRect();
  return { x: t.clientX - br.left, y: t.clientY - br.top };
}

/* ══════════════════════════════════════
   ИНИЦИАЛИЗАЦИЯ
══════════════════════════════════════ */
function init() {
  pieces.forEach(p => p.remove());
  pieces = [];
  drag = null;
  pan  = null;
  pinch = null;
  zoom = 1;
  panX = 0;
  panY = 0;

  build();
}

/* ══════════════════════════════════════
   ПОСТРОЕНИЕ ПАЗЛА (квадрат 1:1)
══════════════════════════════════════ */
function build() {
  const bw = board.offsetWidth;
  const bh = board.offsetHeight;

  // Сторона рамки сборки = меньшая из (70% ширины, 80% высоты), картинка квадратная
  const side = Math.min(bw * 0.70, bh * 0.80);

  // Размер «мира»: рамка + отступы вокруг (есть место для разброса деталей)
  const pad = side * CONFIG.worldPad;
  worldW = side + pad * 2;
  worldH = side + pad * 2;

  // Рамка сборки — в центре мира
  const tl = pad;
  const tt = pad;

  tRect = { l: tl, t: tt, w: side, h: side };

  // Применяем геометрию
  world.style.width  = worldW + 'px';
  world.style.height = worldH + 'px';

  targetEl.style.left   = tl + 'px';
  targetEl.style.top    = tt + 'px';
  targetEl.style.width  = side + 'px';
  targetEl.style.height = side + 'px';

  pieceW = side / CONFIG.cols;
  pieceH = side / CONFIG.rows;

  // Стартовый зум: чтобы рамка целиком влезала в board с небольшим запасом
  zoom = Math.min(bw / worldW, bh / worldH);
  zoom = Math.max(CONFIG.minZoom, Math.min(zoom, CONFIG.maxZoom));

  // Центрируем world в board
  panX = (bw - worldW * zoom) / 2;
  panY = (bh - worldH * zoom) / 2;

  applyTransform();
  makePieces();
}

function makePieces() {
  const positions = scatter(CONFIG.cols * CONFIG.rows);

  for (let row = 0; row < CONFIG.rows; row++) {
    for (let col = 0; col < CONFIG.cols; col++) {
      const idx = row * CONFIG.cols + col;
      const el  = document.createElement('div');
      el.className = 'piece';

      el.dataset.col     = col;
      el.dataset.row     = row;
      el.dataset.cx      = tRect.l + col * pieceW;
      el.dataset.cy      = tRect.t + row * pieceH;
      el.dataset.snapped = '0';

      el.style.width              = pieceW + 'px';
      el.style.height             = pieceH + 'px';
      el.style.backgroundImage    = `url('${CONFIG.imageUrl}')`;
      el.style.backgroundSize     = `${tRect.w}px ${tRect.h}px`;
      el.style.backgroundPosition = `-${col * pieceW}px -${row * pieceH}px`;

      const { x, y } = positions[idx];
      el.style.left = x + 'px';
      el.style.top  = y + 'px';

      el.addEventListener('mousedown', onPieceDown);
      el.addEventListener('touchstart', onPieceDown, { passive: false });

      world.appendChild(el);
      pieces.push(el);
    }
  }
}

/* ══════════════════════════════════════
   РАЗБРОС ВОКРУГ РАМКИ В МИРЕ
══════════════════════════════════════ */
function scatter(n) {
  const { l, t, w, h } = tRect;
  const pad = 8;
  const out = [];

  const regions = [
    { xl: 0,           xr: worldW - pieceW,  yt: 0,           yb: t - pad - pieceH },
    { xl: 0,           xr: worldW - pieceW,  yt: t + h + pad, yb: worldH - pieceH  },
    { xl: 0,           xr: l - pad - pieceW, yt: 0,           yb: worldH - pieceH  },
    { xl: l + w + pad, xr: worldW - pieceW,  yt: 0,           yb: worldH - pieceH  },
  ].filter(r => r.xr > r.xl && r.yb > r.yt);

  for (let i = 0; i < n; i++) {
    let x = 0, y = 0;

    const shuffled = regions
      .map(r => ({ r, sort: Math.random() }))
      .sort((a, b) => a.sort - b.sort)
      .map(s => s.r);

    let ok = false;
    for (const reg of shuffled) {
      x = reg.xl + Math.random() * (reg.xr - reg.xl);
      y = reg.yt + Math.random() * (reg.yb - reg.yt);
      x = Math.max(0, Math.min(x, worldW - pieceW));
      y = Math.max(0, Math.min(y, worldH - pieceH));
      ok = true;
      break;
    }

    if (!ok) {
      x = Math.random() * (worldW - pieceW);
      y = Math.random() * (worldH - pieceH);
    }

    out.push({ x, y });
  }
  return out;
}

/* ══════════════════════════════════════
   DRAG START (КУСОЧЕК)
══════════════════════════════════════ */
function onPieceDown(e) {
  if (e.type === 'touchstart') {
    // Pinch-zoom приоритетнее, чем drag кусочка
    if (e.touches.length >= 2) {
      startPinch(e);
      return;
    }
    e.preventDefault();
  }
  if (drag || pan || pinch) return;
  if (puzzleComplete()) return;

  const piece = e.currentTarget;
  if (piece.dataset.snapped === '1') return;

  // Останавливаем всплытие, чтобы не запустилось панорамирование на board
  e.stopPropagation();

  const sp = evtBoardPos(e);
  const wp = screenToWorld(sp.x, sp.y);

  const origLeft = parseFloat(piece.style.left);
  const origTop  = parseFloat(piece.style.top);

  drag = {
    piece,
    origLeft,
    origTop,
    startWX: wp.x,
    startWY: wp.y,
  };

  piece.classList.add('dragging');
  piece.style.zIndex = '501';
}

/* ══════════════════════════════════════
   PAN / DRAG / PINCH MOVE
══════════════════════════════════════ */
document.addEventListener('mousemove', onMove);
document.addEventListener('touchmove', onMove, { passive: false });

function onMove(e) {
  // Pinch-zoom (приоритет)
  if (pinch && e.type === 'touchmove' && e.touches.length >= 2) {
    e.preventDefault();
    updatePinch(e);
    return;
  }

  if (drag) {
    if (e.type === 'touchmove') e.preventDefault();
    const sp = evtBoardPos(e);
    const wp = screenToWorld(sp.x, sp.y);

    const ddx = wp.x - drag.startWX;
    const ddy = wp.y - drag.startWY;

    drag.piece.style.left = Math.max(0, Math.min(drag.origLeft + ddx, worldW - pieceW)) + 'px';
    drag.piece.style.top  = Math.max(0, Math.min(drag.origTop  + ddy, worldH - pieceH)) + 'px';
    return;
  }

  if (pan) {
    if (e.type === 'touchmove') e.preventDefault();
    const sp = evtBoardPos(e);
    panX = pan.startPanX + (sp.x - pan.startSX);
    panY = pan.startPanY + (sp.y - pan.startSY);
    clampPan();
    applyTransform();
    return;
  }
}

/* ══════════════════════════════════════
   END (mouseup / touchend)
══════════════════════════════════════ */
document.addEventListener('mouseup', onUp);
document.addEventListener('touchend', onUp, { passive: false });
document.addEventListener('touchcancel', onUp, { passive: false });

function onUp(e) {
  // Закончилось pinch-движение
  if (pinch) {
    if (!e.touches || e.touches.length < 2) {
      pinch = null;
    }
    // Если остался один палец — не запускаем pan/drag, ждём следующего жеста
    return;
  }

  if (drag) {
    const piece = drag.piece;
    piece.classList.remove('dragging');
    piece.style.zIndex = '';

    const dist = Math.hypot(
      parseFloat(piece.style.left) - parseFloat(piece.dataset.cx),
      parseFloat(piece.style.top)  - parseFloat(piece.dataset.cy)
    );

    if (dist < CONFIG.snapDist) {
      doSnap(piece);
    }
    drag = null;
    return;
  }

  if (pan) {
    pan = null;
    board.classList.remove('panning');
  }
}

/* ══════════════════════════════════════
   ПАНОРАМИРОВАНИЕ ПО BOARD
   (если клик/тач НЕ по кусочку)
══════════════════════════════════════ */
board.addEventListener('mousedown', onBoardDown);
board.addEventListener('touchstart', onBoardDown, { passive: false });

function onBoardDown(e) {
  // Если жмут на кусочек — он сам обработает (stopPropagation)
  if (e.target.closest('.piece')) return;
  // Игнорируем клики по HUD
  if (e.target.closest('#zoom-hud')) return;

  if (e.type === 'touchstart') {
    if (e.touches.length >= 2) {
      startPinch(e);
      return;
    }
    e.preventDefault();
  }
  if (drag || pan || pinch) return;

  const sp = evtBoardPos(e);
  pan = {
    startSX: sp.x,
    startSY: sp.y,
    startPanX: panX,
    startPanY: panY,
  };
  board.classList.add('panning');
}

/* ══════════════════════════════════════
   ОГРАНИЧЕНИЕ ПАНОРАМИРОВАНИЯ
   (мир не «улетает» полностью за пределы board)
══════════════════════════════════════ */
function clampPan() {
  const bw = board.offsetWidth;
  const bh = board.offsetHeight;
  const wW = worldW * zoom;
  const wH = worldH * zoom;

  // Если world меньше board — центрируем
  // Иначе ограничиваем так, чтобы world всегда покрывал хотя бы часть viewport
  const margin = 80; // допускаем «вылет» world на 80px за край

  if (wW <= bw) {
    panX = (bw - wW) / 2;
  } else {
    const minX = bw - wW - margin;
    const maxX = margin;
    panX = Math.max(minX, Math.min(panX, maxX));
  }

  if (wH <= bh) {
    panY = (bh - wH) / 2;
  } else {
    const minY = bh - wH - margin;
    const maxY = margin;
    panY = Math.max(minY, Math.min(panY, maxY));
  }
}

/* ══════════════════════════════════════
   ЗУМ КОЛЁСИКОМ
══════════════════════════════════════ */
board.addEventListener('wheel', onWheel, { passive: false });

function onWheel(e) {
  e.preventDefault();
  const sp = evtBoardPos(e);
  const factor = e.deltaY < 0 ? CONFIG.zoomStep : 1 / CONFIG.zoomStep;
  zoomAt(sp.x, sp.y, factor);
}

/* ══════════════════════════════════════
   ЗУМ В ТОЧКЕ
══════════════════════════════════════ */
function zoomAt(sx, sy, factor) {
  const newZoom = Math.max(CONFIG.minZoom, Math.min(zoom * factor, CONFIG.maxZoom));
  if (newZoom === zoom) return;

  // Сохраняем точку под курсором: world-координата (sx, sy) до и после должна совпасть
  const wp = screenToWorld(sx, sy);
  zoom = newZoom;
  panX = sx - wp.x * zoom;
  panY = sy - wp.y * zoom;
  clampPan();
  applyTransform();
}

/* ══════════════════════════════════════
   PINCH-ZOOM (два пальца)
══════════════════════════════════════ */
function startPinch(e) {
  // Если в этот момент тащим кусочек — отменяем drag
  if (drag) {
    drag.piece.classList.remove('dragging');
    drag.piece.style.zIndex = '';
    drag = null;
  }
  if (pan) {
    pan = null;
    board.classList.remove('panning');
  }

  const t1 = e.touches[0];
  const t2 = e.touches[1];
  const br = board.getBoundingClientRect();

  const x1 = t1.clientX - br.left;
  const y1 = t1.clientY - br.top;
  const x2 = t2.clientX - br.left;
  const y2 = t2.clientY - br.top;

  pinch = {
    startDist: Math.hypot(x2 - x1, y2 - y1),
    startZoom: zoom,
    startPanX: panX,
    startPanY: panY,
    startCenterX: (x1 + x2) / 2,
    startCenterY: (y1 + y2) / 2,
    startWorld: screenToWorld((x1 + x2) / 2, (y1 + y2) / 2),
  };
}

function updatePinch(e) {
  const t1 = e.touches[0];
  const t2 = e.touches[1];
  const br = board.getBoundingClientRect();

  const x1 = t1.clientX - br.left;
  const y1 = t1.clientY - br.top;
  const x2 = t2.clientX - br.left;
  const y2 = t2.clientY - br.top;

  const dist = Math
