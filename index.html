<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Пазл с шифром</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  overflow: hidden;
  overscroll-behavior: none;
  background: #1a1a2e;
  color: #dde3f0;
  font-family: 'Courier New', Courier, monospace;
  user-select: none;
  -webkit-user-select: none;
  -webkit-touch-callout: none;
}

body {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

header {
  flex: 0 0 auto;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 18px;
  background: #0f2240;
  border-bottom: 1px solid rgba(233, 69, 96, 0.35);
  z-index: 8000;
}

header p {
  font-size: 13px;
  line-height: 1.5;
  text-align: center;
  color: #8fa5c0;
}

header strong {
  color: #e94560;
  font-weight: 700;
}

#board {
  flex: 1 1 auto;
  position: relative;
  overflow: hidden;
  cursor: grab;
  touch-action: none;
}

#board.panning { cursor: grabbing; }

#world {
  position: absolute;
  left: 0;
  top: 0;
  transform-origin: 0 0;
  will-change: transform;
}

#target {
  position: absolute;
  border: 1px dashed rgba(255, 255, 255, 0.25);
  background-image: url('secret2.png');
  background-repeat: no-repeat;
  background-size: 100% 100%;
  pointer-events: none;
  z-index: 0;
}

#target::before {
  content: '';
  position: absolute;
  inset: 0;
  background: rgba(0, 0, 0, 0.55);
  z-index: 1;
}

.piece {
  position: absolute;
  background-repeat: no-repeat;
  cursor: grab;
  box-shadow:
    inset 0 0 0 1px rgba(255, 255, 255, 0.07),
    0 2px 8px rgba(0, 0, 0, 0.55);
  will-change: left, top;
  touch-action: none;
  z-index: 2;
  transition: box-shadow 0.12s;
}

.piece:hover {
  box-shadow:
    inset 0 0 0 1px rgba(255, 255, 255, 0.12),
    0 5px 18px rgba(0, 0, 0, 0.75);
  z-index: 3 !important;
}

.piece.dragging {
  cursor: grabbing !important;
  box-shadow:
    inset 0 0 0 1px rgba(255, 255, 255, 0.15),
    0 10px 36px rgba(0, 0, 0, 0.9);
  transition: none;
}

.piece.locked {
  cursor: default !important;
  pointer-events: none;
}

@keyframes snapFlash {
  0%   { transform: scale(1); }
  38%  { transform: scale(1.05); box-shadow: inset 0 0 0 2px rgba(255,255,255,0.3), 0 0 22px rgba(255,255,255,0.7), 0 0 10px rgba(233,69,96,0.55); }
  100% { transform: scale(1); }
}

.piece.snap-flash { animation: snapFlash 300ms ease-out forwards; }

#zoom-hud {
  position: absolute;
  bottom: 14px;
  right: 14px;
  display: flex;
  gap: 6px;
  z-index: 9000;
}

.zoom-btn {
  width: 36px;
  height: 36px;
  background: rgba(15, 34, 64, 0.85);
  border: 1px solid rgba(255, 255, 255, 0.15);
  color: #c5d5e8;
  font-family: inherit;
  font-size: 18px;
  font-weight: 700;
  border-radius: 6px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}

.zoom-btn:hover { background: rgba(40, 65, 110, 0.95); }
</style>
</head>
<body>

<header>
  <p>Собери пазл и разгадай шифр. Ответ пришли личным сообщением в&nbsp;tg или mattermost <strong>@ilya_malyapa</strong></p>
</header>

<div id="board">
  <div id="world">
    <div id="target"></div>
  </div>

  <div id="zoom-hud">
    <button class="zoom-btn" id="zoom-out">−</button>
    <button class="zoom-btn" id="zoom-reset" style="font-size:13px">⟲</button>
    <button class="zoom-btn" id="zoom-in">+</button>
  </div>
</div>

<script>
'use strict';

const CONFIG = {
  imageUrl:    'secret.png',
  bgImageUrl:  'secret2.png',
  cols:        6,
  rows:        5,
  snapDist:    25,
  snapMs:      200,
  worldPad:    0.6,
  minZoom:     0.4,
  maxZoom:     3.0,
  zoomStep:    1.15,
};

const board    = document.getElementById('board');
const world    = document.getElementById('world');
const targetEl = document.getElementById('target');
const btnIn    = document.getElementById('zoom-in');
const btnOut   = document.getElementById('zoom-out');
const btnReset = document.getElementById('zoom-reset');

let pieces = [];
let pieceW = 0, pieceH = 0;
let tRect  = {};
let worldW = 0, worldH = 0;

let zoom = 1, panX = 0, panY = 0;
let initialZoom = 1, initialPanX = 0, initialPanY = 0;

let drag = null;
let pan  = null;
let pinch = null;

let audioCtx = null;

function puzzleComplete() {
  return pieces.length > 0 && pieces.every(p => p.dataset.snapped === '1');
}

function applyTransform() {
  world.style.transform = `translate(${panX}px, ${panY}px) scale(${zoom})`;
}

function screenToWorld(sx, sy) {
  return { x: (sx - panX) / zoom, y: (sy - panY) / zoom };
}

function evtBoardPos(e) {
  const t = e.touches ? e.touches[0] : e;
  const br = board.getBoundingClientRect();
  return { x: t.clientX - br.left, y: t.clientY - br.top };
}

function init() {
  pieces.forEach(p => p.remove());
  pieces = [];
  drag = null; pan = null; pinch = null;
  build();
}

function build() {
  const bw = board.offsetWidth;
  const bh = board.offsetHeight;

  // Картинка квадратная 1:1
  const side = Math.min(bw * 0.70, bh * 0.80);

  const pad = side * CONFIG.worldPad;
  worldW = side + pad * 2;
  worldH = side + pad * 2;

  const tl = pad, tt = pad;
  tRect = { l: tl, t: tt, w: side, h: side };

  world.style.width  = worldW + 'px';
  world.style.height = worldH + 'px';

  targetEl.style.left   = tl + 'px';
  targetEl.style.top    = tt + 'px';
  targetEl.style.width  = side + 'px';
  targetEl.style.height = side + 'px';

  pieceW = side / CONFIG.cols;
  pieceH = side / CONFIG.rows;

  zoom = Math.min(bw / worldW, bh / worldH);
  zoom = Math.max(CONFIG.minZoom, Math.min(zoom, CONFIG.maxZoom));
  panX = (bw - worldW * zoom) / 2;
  panY = (bh - worldH * zoom) / 2;

  initialZoom = zoom;
  initialPanX = panX;
  initialPanY = panY;

  applyTransform();
  makePieces();
}

function makePieces() {
  const positions = scatter(CONFIG.cols * CONFIG.rows);

  for (let row = 0; row < CONFIG.rows; row++) {
    for (let col = 0; col < CONFIG.cols; col++) {
      const idx = row * CONFIG.cols + col;
      const el  = document.createElement('div');
      el.className = 'piece';

      el.dataset.col = col;
      el.dataset.row = row;
      el.dataset.cx  = tRect.l + col * pieceW;
      el.dataset.cy  = tRect.t + row * pieceH;
      el.dataset.snapped = '0';

      el.style.width  = pieceW + 'px';
      el.style.height = pieceH + 'px';
      el.style.backgroundImage    = `url('${CONFIG.imageUrl}')`;
      el.style.backgroundSize     = `${tRect.w}px ${tRect.h}px`;
      el.style.backgroundPosition = `-${col * pieceW}px -${row * pieceH}px`;

      const { x, y } = positions[idx];
      el.style.left = x + 'px';
      el.style.top  = y + 'px';

      el.addEventListener('mousedown', onPieceDown);
      el.addEventListener('touchstart', onPieceDown, { passive: false });

      world.appendChild(el);
      pieces.push(el);
    }
  }
}

function scatter(n) {
  const { l, t, w, h } = tRect;
  const pad = 8;
  const out = [];

  const regions = [
    { xl: 0,           xr: worldW - pieceW,  yt: 0,           yb: t - pad - pieceH },
    { xl: 0,           xr: worldW - pieceW,  yt: t + h + pad, yb: worldH - pieceH  },
    { xl: 0,           xr: l - pad - pieceW, yt: 0,           yb: worldH - pieceH  },
    { xl: l + w + pad, xr: worldW - pieceW,  yt: 0,           yb: worldH - pieceH  },
  ].filter(r => r.xr > r.xl && r.yb > r.yt);

  for (let i = 0; i < n; i++) {
    let x = 0, y = 0;
    const shuffled = regions
      .map(r => ({ r, sort: Math.random() }))
      .sort((a, b) => a.sort - b.sort)
      .map(s => s.r);

    if (shuffled.length) {
      const reg = shuffled[0];
      x = reg.xl + Math.random() * (reg.xr - reg.xl);
      y = reg.yt + Math.random() * (reg.yb - reg.yt);
    } else {
      x = Math.random() * (worldW - pieceW);
      y = Math.random() * (worldH - pieceH);
    }
    x = Math.max(0, Math.min(x, worldW - pieceW));
    y = Math.max(0, Math.min(y, worldH - pieceH));
    out.push({ x, y });
  }
  return out;
}

/* ── DRAG START (КУСОЧЕК) ── */
function onPieceDown(e) {
  if (e.type === 'touchstart') {
    if (e.touches.length >= 2) { startPinch(e); return; }
    e.preventDefault();
  }
  if (drag || pan || pinch) return;
  if (puzzleComplete()) return;

  const piece = e.currentTarget;
  if (piece.dataset.snapped === '1') return;

  e.stopPropagation();

  const sp = evtBoardPos(e);
  const wp = screenToWorld(sp.x, sp.y);

  drag = {
    piece,
    origLeft: parseFloat(piece.style.left),
    origTop:  parseFloat(piece.style.top),
    startWX:  wp.x,
    startWY:  wp.y,
  };

  piece.classList.add('dragging');
  piece.style.zIndex = '501';
}

document.addEventListener('mousemove', onMove);
document.addEventListener('touchmove', onMove, { passive: false });

function onMove(e) {
  if (pinch && e.type === 'touchmove' && e.touches.length >= 2) {
    e.preventDefault();
    updatePinch(e);
    return;
  }

  if (drag) {
    if (e.type === 'touchmove') e.preventDefault();
    const sp = evtBoardPos(e);
    const wp = screenToWorld(sp.x, sp.y);
    const ddx = wp.x - drag.startWX;
    const ddy = wp.y - drag.startWY;
    drag.piece.style.left = Math.max(0, Math.min(drag.origLeft + ddx, worldW - pieceW)) + 'px';
    drag.piece.style.top  = Math.max(0, Math.min(drag.origTop  + ddy, worldH - pieceH)) + 'px';
    return;
  }

  if (pan) {
    if (e.type === 'touchmove') e.preventDefault();
    const sp = evtBoardPos(e);
    panX = pan.startPanX + (sp.x - pan.startSX);
    panY = pan.startPanY + (sp.y - pan.startSY);
    clampPan();
    applyTransform();
  }
}

document.addEventListener('mouseup', onUp);
document.addEventListener('touchend', onUp, { passive: false });
document.addEventListener('touchcancel', onUp, { passive: false });

function onUp(e) {
  if (pinch) {
    if (!e.touches || e.touches.length < 2) pinch = null;
    return;
  }

  if (drag) {
    const piece = drag.piece;
    piece.classList.remove('dragging');
    piece.style.zIndex = '';

    const dist = Math.hypot(
      parseFloat(piece.style.left) - parseFloat(piece.dataset.cx),
      parseFloat(piece.style.top)  - parseFloat(piece.dataset.cy)
    );
    if (dist < CONFIG.snapDist) doSnap(piece);
    drag = null;
    return;
  }

  if (pan) {
    pan = null;
    board.classList.remove('panning');
  }
}

/* ── PAN по board ── */
board.addEventListener('mousedown', onBoardDown);
board.addEventListener('touchstart', onBoardDown, { passive: false });

function onBoardDown(e) {
  if (e.target.closest('.piece')) return;
  if (e.target.closest('#zoom-hud')) return;

  if (e.type === 'touchstart') {
    if (e.touches.length >= 2) { startPinch(e); return; }
    e.preventDefault();
  }
  if (drag || pan || pinch) return;

  const sp = evtBoardPos(e);
  pan = {
    startSX: sp.x,
    startSY: sp.y,
    startPanX: panX,
    startPanY: panY,
  };
  board.classList.add('panning');
}

function clampPan() {
  const bw = board.offsetWidth;
  const bh = board.offsetHeight;
  const wW = worldW * zoom;
  const wH = worldH * zoom;
  const margin = 80;

  if (wW <= bw) panX = (bw - wW) / 2;
  else panX = Math.max(bw - wW - margin, Math.min(panX, margin));

  if (wH <= bh) panY = (bh - wH) / 2;
  else panY = Math.max(bh - wH - margin, Math.min(panY, margin));
}

/* ── ЗУМ ── */
board.addEventListener('wheel', onWheel, { passive: false });

function onWheel(e) {
  e.preventDefault();
  const sp = evtBoardPos(e);
  const factor = e.deltaY < 0 ? CONFIG.zoomStep : 1 / CONFIG.zoomStep;
  zoomAt(sp.x, sp.y, factor);
}

function zoomAt(sx, sy, factor) {
  const newZoom = Math.max(CONFIG.minZoom, Math.min(zoom * factor, CONFIG.maxZoom));
  if (newZoom === zoom) return;
  const wp = screenToWorld(sx, sy);
  zoom = newZoom;
  panX = sx - wp.x * zoom;
  panY = sy - wp.y * zoom;
  clampPan();
  applyTransform();
}

btnIn.addEventListener('click', () => {
  zoomAt(board.offsetWidth / 2, board.offsetHeight / 2, CONFIG.zoomStep);
});
btnOut.addEventListener('click', () => {
  zoomAt(board.offsetWidth / 2, board.offsetHeight / 2, 1 / CONFIG.zoomStep);
});
btnReset.addEventListener('click', () => {
  zoom = initialZoom;
  panX = initialPanX;
  panY = initialPanY;
  applyTransform();
});

/* ── PINCH ── */
function startPinch(e) {
  if (drag) {
    drag.piece.classList.remove('dragging');
    drag.piece.style.zIndex = '';
    drag = null;
  }
  if (pan) {
    pan = null;
    board.classList.remove('panning');
  }

  const t1 = e.touches[0], t2 = e.touches[1];
  const br = board.getBoundingClientRect();
  const x1 = t1.clientX - br.left, y1 = t1.clientY - br.top;
  const x2 = t2.clientX - br.left, y2 = t2.clientY - br.top;
  const cx = (x1 + x2) / 2, cy = (y1 + y2) / 2;

  pinch = {
    startDist: Math.hypot(x2 - x1, y2 - y1),
    startZoom: zoom,
    centerSX: cx,
    centerSY: cy,
    startWorld: screenToWorld(cx, cy),
  };
}

function updatePinch(e) {
  const t1 = e.touches[0], t2 = e.touches[1];
  const br = board.getBoundingClientRect();
  const x1 = t1.clientX - br.left, y1 = t1.clientY - br.top;
  const x2 = t2.clientX - br.left, y2 = t2.clientY - br.top;

  const dist = Math.hypot(x2 - x1, y2 - y1);
  const cx = (x1 + x2) / 2, cy = (y1 + y2) / 2;

  let newZoom = pinch.startZoom * (dist / pinch.startDist);
  newZoom = Math.max(CONFIG.minZoom, Math.min(newZoom, CONFIG.maxZoom));

  zoom = newZoom;
  // Чтобы точка под пальцами оставалась той же в мире
  panX = cx - pinch.startWorld.x * zoom;
  panY = cy - pinch.startWorld.y * zoom;
  clampPan();
  applyTransform();
}

/* ── SNAP ── */
function doSnap(piece) {
  piece.dataset.snapped = '1';
  piece.style.transition = `left ${CONFIG.snapMs}ms ease-out, top ${CONFIG.snapMs}ms ease-out`;
  piece.style.left = piece.dataset.cx + 'px';
  piece.style.top  = piece.dataset.cy + 'px';

  piece.classList.remove('snap-flash');
  void piece.offsetWidth;
  piece.classList.add('snap-flash');
  piece.style.zIndex = '3';

  playSnap();

  setTimeout(() => {
    piece.style.transition = '';
    piece.classList.remove('snap-flash');
    piece.classList.add('locked');
  }, CONFIG.snapMs + 80);
}

function playSnap() {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const osc  = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(900, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(440, audioCtx.currentTime + 0.18);
    gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.22);
    osc.start(audioCtx.currentTime);
    osc.stop(audioCtx.currentTime + 0.22);
  } catch (_) {}
}

init();
</script>
</body>
</html>
